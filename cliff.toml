# git-cliff config — https://git-cliff.org
# Generates CHANGELOG.md from Conventional Commits.

[changelog]
header = "# Changelog\n\nAll notable changes to Leap are documented here.\n\n"
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^doc", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
    { message = "^style", group = "Styling" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Chores" },
]
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
