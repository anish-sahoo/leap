name: Release

# Cutting a release is a manual, admin-only action: pick a SemVer bump
# (patch/minor/major) and the workflow computes the next version from the latest
# tag, builds + tests, bundles Leap.app, and publishes a GitHub Release.
#   Actions ▸ Release ▸ Run workflow ▸ choose bump
# The first release (no prior tags) is a `major` bump: v0.0.0 -> v1.0.0.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (from the latest tag)"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  # Gate: only repo admins may cut a release. workflow_dispatch already requires
  # write access; this narrows it to admins by checking the collaborator role.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify the actor is a repo admin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" --jq '.permission')
          echo "actor=${{ github.actor }} permission=$PERM"
          if [ "$PERM" != "admin" ]; then
            echo "::error::Only repo admins can run the release workflow (you have: '$PERM')."
            exit 1
          fi

  release:
    needs: guard
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # tags + full history for git describe / changelog

      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          LATEST=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          LATEST=${LATEST:-v0.0.0}
          IFS=. read -r MA MI PA <<< "${LATEST#v}"
          case "$BUMP" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            patch) PA=$((PA + 1)) ;;
            *) echo "::error::unknown bump '$BUMP'"; exit 1 ;;
          esac
          TAG="v$MA.$MI.$PA"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG already exists"; exit 1
          fi
          echo "version=$MA.$MI.$PA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "==> $LATEST + $BUMP -> $TAG"

      - name: Install mise + tools
        uses: jdx/mise-action@v3

      - name: Verify (format + lint + test)
        run: |
          mise run check
          swift test

      - name: Update CHANGELOG.md
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git-cliff --tag "$TAG" --output CHANGELOG.md
          if ! git diff --quiet CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore(release): $TAG"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Bundle Leap.app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: MARKETING_VERSION="$VERSION" mise run bundle

      - name: Package artifacts (zip + dmg + checksums)
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          cd dist
          ZIP="Leap-${TAG}.zip"
          DMG="Leap-${TAG}.dmg"

          # Zip: preserves the bundle + its signature (ditto is the safe tool).
          ditto -c -k --sequesterRsrc --keepParent Leap.app "$ZIP"

          # DMG: drag-to-Applications convenience image.
          STAGE="$(mktemp -d)"
          cp -R Leap.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Leap" -srcfolder "$STAGE" -ov -format UDZO "$DMG"

          shasum -a 256 "$ZIP" "$DMG" > "checksums-${TAG}.txt"
          ls -la

      - name: Generate release notes
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: git-cliff --unreleased --tag "$TAG" --strip header --output RELEASE_NOTES.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          gh release create "$TAG" \
            "dist/Leap-${TAG}.zip" \
            "dist/Leap-${TAG}.dmg" \
            "dist/checksums-${TAG}.txt" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --target "$(git rev-parse HEAD)"
