name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install mise + tools
        uses: jdx/mise-action@v3

      - name: SwiftLint (strict)
        run: swiftlint lint --quiet --strict Sources
