name: Format

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install mise + tools
        uses: jdx/mise-action@v3

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint Sources
