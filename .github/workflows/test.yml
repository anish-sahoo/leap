name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install mise + tools
        uses: jdx/mise-action@v3

      - name: Test
        run: swift test
