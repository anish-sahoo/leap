name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Each check is its own job so they show up as separate entries (CI / format,
# CI / lint, CI / test, CI / build) and can be tracked independently, while all
# living under the one "CI" workflow.
#
# Caching:
#   - mise-action caches the installed dev tools (swiftlint/swiftformat/…).
#   - test/build cache SwiftPM's .build (compiled deps + artifacts), keyed on
#     Package.resolved. lint/format don't compile, so they skip it.
jobs:
  format:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Install mise + tools
        uses: jdx/mise-action@v3
        with:
          cache: true
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint Sources

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Install mise + tools
        uses: jdx/mise-action@v3
        with:
          cache: true
      - name: SwiftLint (strict)
        run: swiftlint lint --quiet --strict Sources

  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Install mise + tools
        uses: jdx/mise-action@v3
        with:
          cache: true
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-test-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-test-
      - name: Test
        run: swift test

  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Install mise + tools
        uses: jdx/mise-action@v3
        with:
          cache: true
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-build-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-build-
      - name: Build
        run: swift build
      - name: Bundle smoke test
        run: mise run bundle
