name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install mise + tools
        uses: jdx/mise-action@v3

      - name: Format + lint
        run: mise run check

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Bundle smoke test
        run: mise run bundle
